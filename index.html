<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ash Dashboard - Subagents</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
    <style>
        #cy { width: 100%; height: 500px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Ash Subagents Map</h1>
    <div id="cy"></div>
    <script>
        async function fetchStatus() {
            const response = await fetch('subagents-status.json');
            const data = await response.json();
            
            const elements = [{ data: { id: 'Ash', label: 'Ash (Main)' } }];
            data.active_agents.forEach(agent => {
                elements.push({ data: { id: agent.id, label: agent.task } });
                elements.push({ data: { source: 'Ash', target: agent.id } });
            });

            var cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                style: [
                    { selector: 'node', style: { 'background-color': '#0074D9', 'label': 'data(label)' } },
                    { selector: 'edge', style: { 'width': 3, 'line-color': '#ccc' } }
                ],
                layout: { name: 'breadthfirst' }
            });
        }
        setInterval(fetchStatus, 5000);
        fetchStatus();
    </script>
</body>
</html>
